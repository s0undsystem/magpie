version: 2

project_name: magpie

before:
  hooks:
    - go mod tidy

builds:
  - id: magpie
    main: ./cmd/magpie
    binary: magpie
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/harborproject/magpie/internal/version.Version={{.Version}}

archives:
  - id: magpie
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"

release:
  github:
    owner: harborproject
    name: magpie

brews:
  - name: magpie
    repository:
      owner: harborproject
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/harborproject/magpie"
    description: "Passive, read-only reconnaissance for a domain's /.well-known/ directory"
    license: "MIT"
    test: |
      system "#{bin}/magpie --version"
